add_newline = true

format = """
$cmd_duration $directory$git_branch
  $character"""

[fill]
symbol = '-'
style = 'fg:#45475a'  # surface2

[character]
success_symbol = "[о©ұ пҒӢ](bold fg:#a6e3a1)"  # green
error_symbol = "[пҖҚ пҒӢ](bold fg:#f38ba8)"    # red

[package]
disabled = true

[git_branch]
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](fg:#313244)[$symbol $branch(:$remote_branch)](fg:#cdd6f4 bg:#313244)[оӮҙ ](fg:#313244)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
cherry_pick = "[рҹҚ’ PICKING](bold fg:#f38ba8)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· "
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](fg:#a6e3a1)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format = "[вҖў$hostname](bg:#313244 fg:#cdd6f4)[оӮҙ](fg:#313244)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true

[time]
disabled = true

[username]
style_user = "bold bg:#313244 fg:#cdd6f4"
style_root = "red bold"
format = "[оӮ¶](fg:#313244)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:#313244 fg:#cdd6f4"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](fg:#313244)[у°үӢ вҶ’ $path]($style)[оӮҙ](fg:#313244)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](fg:#313244)[у°Әў $duration](bg:#313244 fg:#cdd6f4)[оӮҙ](fg:#313244)'
